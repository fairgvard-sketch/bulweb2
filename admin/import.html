  const log = document.getElementById('log');
  function addLog(msg, type = '') {
    log.innerHTML += `<span class="${type}">${msg}\n</span>`;
  }

  document.getElementById('importBtn').addEventListener('click', async () => {
    const email = prompt('Enter your admin email:');
    const pass = prompt('Enter your admin password:');
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      addLog('✓ Signed in', 'ok');
    } catch(e) {
      addLog('✗ Auth failed: ' + e.message, 'err');
      return;
    }

    for (const [catId, items] of Object.entries(menuData)) {
      addLog(`\nImporting ${catId} (${items.length} items)...`);
      for (const item of items) {
        try {
          await addDoc(collection(db, catId), item);
          addLog(`  ✓ ${item.name}`, 'ok');
        } catch(e) {
          addLog(`  ✗ ${item.name}: ${e.message}`, 'err');
        }
      }
    }
    addLog('\n✓ Import complete!', 'ok');
  });
</script>
