  async function findExistingDoc(catId, name) {
    const snap = await getDocs(collection(db, catId));
    for (const d of snap.docs) {
      if (d.data().name === name) return d.id;
    }
    return null;
  }

  document.getElementById('btn').onclick = async () => {
    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'Загружаю...';
    log.innerHTML = '';
    let total = 0, updated = 0, created = 0;

    for (const [catId, items] of Object.entries(MENU)) {
      print(`\n── ${catId} (${items.length} items) ──`, 'info');
      for (const item of items) {
        try {
          const existingId = await findExistingDoc(catId, item.name);
          const data = { ...item, available: true };
          if (existingId) {
            await setDoc(doc(db, catId, existingId), data, { merge: true });
            print(`  ✓ updated: ${item.name}`, 'ok');
            updated++;
          } else {
            await addDoc(collection(db, catId), data);
            print(`  + created: ${item.name}`, 'ok');
            created++;
          }
          total++;
        } catch (e) {
          print(`  ✗ error: ${item.name} — ${e.message}`, 'err');
        }
      }
    }

    print(`\n✅ Done. Created: ${created}, Updated: ${updated}, Total: ${total}`, 'ok');
    btn.textContent = 'Готово ✓';
  };
</script>
</body>
</html>
