<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bulochka Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f5f7;--white:#fff;--brown:#2a1f18;--brown-mid:#7a5a3f;
      --brown-light:#9c8978;--faint:rgba(0,0,0,0.07);--sage:#6b8e5a;
      --red:#e74c3c;--blue:#4a90d9;--purple:#8b5cf6;--sans:'Inter',system-ui,sans-serif;
    }
    body{font-family:var(--sans);background:var(--bg);color:var(--brown);min-height:100vh}

    /* LOGIN */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-box{background:var(--white);border-radius:16px;padding:40px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
    .login-logo{font-size:24px;font-weight:600;margin-bottom:4px}
    .login-sub{font-size:13px;color:var(--brown-light);margin-bottom:28px}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .field label{font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--brown-light)}
    .field input{padding:11px 14px;border:1.5px solid var(--faint);border-radius:10px;font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--brown);outline:none;transition:border .2s}
    .field input:focus{border-color:var(--brown-mid)}
    .btn-login{width:100%;padding:13px;background:var(--brown);color:#fff;border:none;border-radius:10px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;margin-top:6px;transition:background .2s}
    .btn-login:hover{background:var(--brown-mid)}
    .login-err{font-size:12px;color:var(--red);margin-top:10px;text-align:center;min-height:18px}

    /* TOPBAR */
    .topbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1.5px solid var(--faint);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
    .topbar-logo{font-size:16px;font-weight:600}
    .topbar-logo span{color:var(--brown-light);font-weight:400;font-size:13px;margin-left:6px}
    .btn-logout{font-size:12px;color:var(--brown-light);background:none;border:1.5px solid var(--faint);border-radius:100px;padding:6px 16px;cursor:pointer;font-family:var(--sans);transition:all .2s}
    .btn-logout:hover{color:var(--brown);border-color:var(--brown)}

    /* VIEWS */
    .admin-wrap{display:none}
    .admin-wrap.visible{display:block}
    .view{display:none}
    .view.active{display:block}

    /* CATEGORIES VIEW */
    .page-body{max-width:800px;margin:0 auto;padding:28px 24px 80px}
    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .page-title{font-size:20px;font-weight:600}
    .btn-add-cat{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:9px 18px;background:var(--brown);color:#fff;border:none;border-radius:100px;cursor:pointer;font-family:var(--sans);transition:opacity .2s}
    .btn-add-cat:hover{opacity:.85}

    .cat-list{display:flex;flex-direction:column;gap:10px}
    .cat-row{background:var(--white);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:box-shadow .2s;border:1.5px solid transparent}
    .cat-row:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);border-color:var(--faint)}
    .cat-row.selected{border-color:var(--brown);box-shadow:0 4px 16px rgba(0,0,0,0.08)}
    .cat-check{width:20px;height:20px;border:1.5px solid var(--faint);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
    .cat-check.checked{background:var(--brown);border-color:var(--brown);color:#fff}
    .cat-thumb{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg)}
    .cat-thumb-placeholder{width:48px;height:48px;border-radius:50%;background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
    .cat-info{flex:1;min-width:0}
    .cat-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cat-count{font-size:12px;color:var(--brown-light);margin-top:2px}
    .cat-actions{display:flex;align-items:center;gap:4px}
    .icon-btn{width:34px;height:34px;border:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg);transition:background .2s;flex-shrink:0}
    .icon-btn:hover{background:var(--faint)}
    .icon-btn svg{width:16px;height:16px}
    .icon-btn.green svg{color:var(--sage)}
    .icon-btn.blue svg{color:var(--blue)}
    .icon-btn.purple svg{color:var(--purple)}
    .icon-btn.red svg{color:var(--red)}

    /* ITEMS VIEW */
    .back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--brown-light);background:none;border:none;cursor:pointer;font-family:var(--sans);margin-bottom:20px;padding:0;transition:color .2s}
    .back-btn:hover{color:var(--brown)}
    .items-list{display:flex;flex-direction:column;gap:8px}
    .item-row{background:var(--white);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;border:1.5px solid transparent;transition:border .2s}
    .item-row:hover{border-color:var(--faint)}
    .item-thumb{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--bg)}
    .item-info{flex:1;min-width:0}
    .item-name{font-size:14px;font-weight:500}
    .item-desc{font-size:12px;color:var(--brown-light);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-price{font-size:13px;font-weight:500;color:var(--brown-mid);white-space:nowrap;margin-right:8px}
    .btn-add-item{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:9px 18px;background:var(--sage);color:#fff;border:none;border-radius:100px;cursor:pointer;font-family:var(--sans);transition:opacity .2s}
    .btn-add-item:hover{opacity:.85}

    /* MODAL */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
    .overlay.open{display:flex}
    .modal{background:var(--white);border-radius:18px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
    .modal-wide{max-width:620px}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0}
    .modal-title{font-size:17px;font-weight:600}
    .modal-close{width:32px;height:32px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .modal-close svg{width:16px;height:16px;color:var(--brown-light)}

    /* TABS */
    .tabs{display:flex;gap:0;border-bottom:1.5px solid var(--faint);margin:12px 24px 0;padding-bottom:0}
    .tab{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--brown-light);background:none;border:none;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .2s}
    .tab.active{color:var(--purple);border-bottom-color:var(--purple)}
    .tab-content{display:none;padding:20px 24px}
    .tab-content.active{display:block}
    .modal-section-title{font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--brown-light);margin:16px 0 10px}
    .modal-section-title:first-child{margin-top:0}

    /* UPLOAD */
    .upload-area{border:2px dashed var(--faint);border-radius:12px;min-height:160px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;margin-bottom:16px;transition:border-color .2s}
    .upload-area:hover{border-color:var(--brown-light)}
    .upload-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--brown-light);font-size:13px}
    .upload-placeholder svg{opacity:.5}
    .upload-area img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
    .upload-remove{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:100px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:var(--sans)}

    /* TEXTAREA */
    .field textarea{padding:11px 14px;border:1.5px solid var(--faint);border-radius:10px;font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--brown);outline:none;transition:border .2s;resize:vertical;width:100%}
    .field textarea:focus{border-color:var(--brown-mid)}

    /* TOGGLE */
    .avail-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1.5px solid var(--faint);font-size:14px;font-weight:500}
    .toggle{position:relative;display:inline-block;width:44px;height:24px}
    .toggle input{opacity:0;width:0;height:0}
    .toggle-slider{position:absolute;inset:0;background:var(--faint);border-radius:100px;transition:.2s;cursor:pointer}
    .toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
    .toggle input:checked+.toggle-slider{background:var(--sage)}
    .toggle input:checked+.toggle-slider:before{transform:translateX(20px)}

    .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .modal-grid .field{margin-bottom:0}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;padding:16px 24px;border-top:1.5px solid var(--faint);margin-top:auto}
    .btn-cancel{padding:10px 20px;border:1.5px solid var(--faint);border-radius:10px;background:none;font-family:var(--sans);font-size:13px;cursor:pointer;color:var(--brown-light);transition:all .2s}
    .btn-cancel:hover{border-color:var(--brown);color:var(--brown)}
    .btn-save{padding:10px 24px;background:var(--purple);color:#fff;border:none;border-radius:10px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:background .2s}
    .btn-save:hover{opacity:.9}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--brown);color:#fff;padding:12px 24px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:400;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    .empty{text-align:center;padding:48px 24px;color:var(--brown-light);font-size:14px}
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">Bulochka</div>
    <div class="login-sub">Admin panel</div>
    <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="admin@bulochka.com"></div>
    <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
    <button class="btn-login" id="loginBtn">Sign in</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-wrap" id="adminWrap">
  <div class="topbar">
    <div class="topbar-logo">Bulochka <span>Admin</span></div>
    <button class="btn-logout" id="logoutBtn">Sign out</button>
  </div>

  <!-- CATEGORIES VIEW -->
  <div class="view active" id="viewCats">
    <div class="page-body">
      <div class="page-header">
        <div class="page-title">Menu</div>
        <button class="btn-add-cat" id="addCatBtn">+ Add category</button>
      </div>
      <div class="cat-list" id="catList"></div>
    </div>
  </div>

  <!-- ITEMS VIEW -->
  <div class="view" id="viewItems">
    <div class="page-body">
      <button class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Menu
      </button>
      <div class="page-header">
        <div class="page-title" id="itemsTitle">Category</div>
        <button class="btn-add-item" id="addItemBtn">+ Add item</button>
      </div>
      <div class="items-list" id="itemsList"></div>
    </div>
  </div>
</div>

<!-- ITEM MODAL -->
<div class="overlay" id="itemModal">
  <div class="modal modal-wide">
    <div class="modal-header">
      <div class="modal-title" id="itemModalTitle">Add item</div>
      <button class="modal-close" id="itemModalClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="iBasic">Basic Info</button>
      <button class="tab" data-tab="iAvail">Availability</button>
    </div>
    <div class="tab-content active" id="iBasic">
      <div class="upload-area" id="iUploadArea">
        <img id="iImgPreview" style="display:none">
        <div class="upload-placeholder" id="iUploadPlaceholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Upload Image</span>
        </div>
        <button class="upload-remove" id="iImgRemove" style="display:none">🗑 Remove</button>
        <input type="file" id="iImgFile" accept="image/*" style="display:none">
      </div>
      <div class="modal-section-title">Item name</div>
      <div class="modal-grid">
        <div class="field"><label>Name in English</label><input type="text" id="iName" placeholder="Espresso"></div>
        <div class="field"><label>Name in Hebrew</label><input type="text" id="iNameHe" placeholder="אספרסו" dir="rtl"></div>
      </div>
      <div class="modal-section-title">Description</div>
      <div class="modal-grid">
        <div class="field"><label>Description in English</label><textarea id="iDesc" placeholder="Short or long..." rows="2"></textarea></div>
        <div class="field"><label>Description in Hebrew</label><textarea id="iDescHe" placeholder="קצר או ארוך..." dir="rtl" rows="2"></textarea></div>
      </div>
      <div class="modal-grid">
        <div class="field"><label>Price</label><input type="text" id="iPrice" placeholder="₪10 / ₪13"></div>
        <div class="field"><label>Comment</label><input type="text" id="iComment" placeholder="Optional note"></div>
      </div>
    </div>
    <div class="tab-content" id="iAvail">
      <div class="avail-row">
        <span>Available</span>
        <label class="toggle"><input type="checkbox" id="iAvailable" checked><span class="toggle-slider"></span></label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="itemModalCancel">Cancel</button>
      <button class="btn-save" id="itemModalSave">Save</button>
    </div>
  </div>
</div>

<!-- CATEGORY MODAL -->
<div class="overlay" id="catModal">
  <div class="modal modal-wide">
    <div class="modal-header">
      <div class="modal-title" id="catModalTitle">Edit Category</div>
      <button class="modal-close" id="catModalClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="cBasic">Basic Info</button>
      <button class="tab" data-tab="cSettings">Settings</button>
    </div>
    <div class="tab-content active" id="cBasic">
      <div class="upload-area" id="cUploadArea">
        <img id="cImgPreview" style="display:none">
        <div class="upload-placeholder" id="cUploadPlaceholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Upload Image</span>
        </div>
        <button class="upload-remove" id="cImgRemove" style="display:none">🗑 Remove</button>
        <input type="file" id="cImgFile" accept="image/*" style="display:none">
      </div>
      <div class="modal-section-title">Category name</div>
      <div class="modal-grid">
        <div class="field"><label>Name in English</label><input type="text" id="cName" placeholder="Hot Drinks"></div>
        <div class="field"><label>Name in Hebrew</label><input type="text" id="cNameHe" placeholder="משקאות חמים" dir="rtl"></div>
      </div>
      <div class="modal-section-title">Description</div>
      <div class="modal-grid">
        <div class="field"><label>Description in English</label><textarea id="cDesc" placeholder="Fresh brewed..." rows="2"></textarea></div>
        <div class="field"><label>Description in Hebrew</label><textarea id="cDescHe" placeholder="..." dir="rtl" rows="2"></textarea></div>
      </div>
      <div class="field"><label>Comment</label><input type="text" id="cComment" placeholder="Optional note"></div>
    </div>
    <div class="tab-content" id="cSettings">
      <div class="avail-row">
        <span>Visible on menu</span>
        <label class="toggle"><input type="checkbox" id="cVisible" checked><span class="toggle-slider"></span></label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="catModalCancel">Cancel</button>
      <button class="btn-save" id="catModalSave">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const app = initializeApp({
    apiKey: "AIzaSyC_zaNtYW8wnS7nhoOzEvkNhbJeJPHWmaI",
    authDomain: "bulweb2.firebaseapp.com",
    projectId: "bulweb2",
    storageBucket: "bulweb2.firebasestorage.app",
    messagingSenderId: "260150671022",
    appId: "1:260150671022:web:6dfa58bd50a9725cec9f3f"
  });

  const auth = getAuth(app);
  const db = getFirestore(app);

  const CATEGORIES = [
    { id: 'hot-drinks',  label: 'Hot Drinks',          emoji: '☕' },
    { id: 'cold-drinks', label: 'Cold Drinks',          emoji: '🧃' },
    { id: 'sandwiches',  label: 'Sandwiches & Salads',  emoji: '🥗' },
    { id: 'pastries',    label: 'Pastries',             emoji: '🥐' },
    { id: 'filled',      label: 'Filled Croissants',    emoji: '🍫' },
    { id: 'tartlets',    label: 'Tartlets',             emoji: '🍰' },
    { id: 'cakes',       label: 'Cakes & Desserts',     emoji: '🎂' },
    { id: 'ice-cream',   label: 'Ice Cream',            emoji: '🍦' },
    { id: 'alcohol',     label: 'Alcohol',              emoji: '🍷' },
    { id: 'friday',      label: 'Friday Special',       emoji: '⭐' },
  ];

  let currentCat = null;
  let editingItemId = null;

  // ── AUTH ──
  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value;
    const pass  = document.getElementById('loginPassword').value;
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      document.getElementById('loginErr').textContent = 'Wrong email or password';
    }
  };
  document.getElementById('loginPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });
  document.getElementById('logoutBtn').onclick = () => signOut(auth);

  onAuthStateChanged(auth, user => {
    document.getElementById('loginWrap').style.display  = user ? 'none' : 'flex';
    document.getElementById('adminWrap').className = user ? 'admin-wrap visible' : 'admin-wrap';
    if (user) loadCategories();
  });

  // ── CATEGORIES ──
  async function loadCategories() {
    showView('viewCats');
    const list = document.getElementById('catList');
    list.innerHTML = '<div class="empty">Loading...</div>';
    const counts = {};
    const meta = {};
    await Promise.all([
      ...CATEGORIES.map(async cat => {
        const snap = await getDocs(collection(db, cat.id));
        counts[cat.id] = snap.size;
      }),
      (async () => {
        const snap = await getDocs(collection(db, '_categories'));
        snap.forEach(d => { meta[d.id] = d.data(); });
      })(),
    ]);
    list.innerHTML = '';
    CATEGORIES.forEach(baseCat => {
      const cat = { ...baseCat, ...meta[baseCat.id] };
      const row = document.createElement('div');
      row.className = 'cat-row';
      row.innerHTML = `
        <div class="cat-thumb-placeholder">${cat.emoji}</div>
        <div class="cat-info">
          <div class="cat-name">${cat.label}</div>
          <div class="cat-count">${counts[cat.id]} items</div>
        </div>
        <div class="cat-actions">
          <button class="icon-btn green" title="View items" data-id="${cat.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <button class="icon-btn blue edit-cat-btn" title="Edit" data-id="${cat.id}" data-label="${cat.label}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="icon-btn red del-cat-btn" title="Delete category" data-id="${cat.id}" data-label="${cat.label}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>`;
      row.querySelector('.icon-btn.green').onclick = () => openCategory(cat.id, cat.label);
      row.querySelector('.edit-cat-btn').onclick   = (e) => { e.stopPropagation(); openCatModal(cat); };
      row.querySelector('.del-cat-btn').onclick    = async (e) => {
        e.stopPropagation();
        if (confirm(`Delete all items in "${cat.label}"? This cannot be undone.`)) {
          const snap = await getDocs(collection(db, cat.id));
          await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
          toast('Deleted');
          loadCategories();
        }
      };
      row.onclick = (e) => { if (!e.target.closest('.icon-btn')) openCategory(cat.id, cat.label); };
      list.appendChild(row);
    });
  }

  function openCategory(catId, catLabel) {
    currentCat = catId;
    document.getElementById('itemsTitle').textContent = catLabel;
    showView('viewItems');
    loadItems();
  }

  document.getElementById('backBtn').onclick = loadCategories;

  // ── ITEMS ──
  async function loadItems() {
    const list = document.getElementById('itemsList');
    list.innerHTML = '<div class="empty">Loading...</div>';
    const snap = await getDocs(collection(db, currentCat));
    const items = [];
    snap.forEach(d => items.push({ id: d.id, ...d.data() }));
    if (items.length === 0) {
      list.innerHTML = '<div class="empty">No items yet</div>';
      return;
    }
    list.innerHTML = '';
    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML = `
        ${item.img ? `<img class="item-thumb" src="../${item.img}" onerror="this.style.display='none'">` : '<div class="item-thumb"></div>'}
        <div class="item-info">
          <div class="item-name">${item.name || '—'}</div>
          <div class="item-desc">${item.desc || ''}</div>
        </div>
        <div class="item-price">${item.price || ''}</div>
        <div class="cat-actions">
          <button class="icon-btn blue" title="Edit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="icon-btn red" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>`;
      const btns = row.querySelectorAll('.icon-btn');
      btns[0].onclick = () => openItemModal(item);
      btns[1].onclick = async () => {
        if (confirm(`Delete "${item.name}"?`)) {
          await deleteDoc(doc(db, currentCat, item.id));
          loadItems();
          toast('Deleted');
        }
      };
      list.appendChild(row);
    });
  }

  // ── TABS ──
  document.querySelectorAll('.tabs').forEach(tabGroup => {
    tabGroup.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        const modal = tab.closest('.modal');
        tabGroup.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        modal.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        modal.querySelector('#' + tab.dataset.tab).classList.add('active');
      };
    });
  });

  // ── UPLOAD HELPERS ──
  function setupUpload(areaId, fileId, previewId, placeholderId, removeId) {
    const area = document.getElementById(areaId);
    const file = document.getElementById(fileId);
    const preview = document.getElementById(previewId);
    const placeholder = document.getElementById(placeholderId);
    const remove = document.getElementById(removeId);
    area.onclick = (e) => { if (e.target !== remove) file.click(); };
    file.onchange = () => {
      const f = file.files[0];
      if (!f) return;
      const url = URL.createObjectURL(f);
      preview.src = url;
      preview.style.display = 'block';
      placeholder.style.display = 'none';
      remove.style.display = 'block';
    };
    remove.onclick = (e) => {
      e.stopPropagation();
      preview.src = '';
      preview.style.display = 'none';
      placeholder.style.display = 'flex';
      remove.style.display = 'none';
      file.value = '';
    };
  }
  setupUpload('iUploadArea','iImgFile','iImgPreview','iUploadPlaceholder','iImgRemove');
  setupUpload('cUploadArea','cImgFile','cImgPreview','cUploadPlaceholder','cImgRemove');

  // ── ITEM MODAL ──
  document.getElementById('addItemBtn').onclick = () => openItemModal(null);
  document.getElementById('itemModalCancel').onclick = () => closeModal('itemModal');
  document.getElementById('itemModalClose').onclick  = () => closeModal('itemModal');
  document.getElementById('itemModalSave').onclick   = saveItem;

  function openItemModal(item) {
    editingItemId = item ? item.id : null;
    document.getElementById('itemModalTitle').textContent = item ? 'Edit item' : 'Add item';
    document.getElementById('iName').value      = item?.name    || '';
    document.getElementById('iNameHe').value    = item?.nameHe  || '';
    document.getElementById('iDesc').value      = item?.desc    || '';
    document.getElementById('iDescHe').value    = item?.descHe  || '';
    document.getElementById('iPrice').value     = item?.price   || '';
    document.getElementById('iComment').value   = item?.comment || '';
    document.getElementById('iAvailable').checked = item?.available !== false;
    const preview = document.getElementById('iImgPreview');
    const placeholder = document.getElementById('iUploadPlaceholder');
    const removeBtn = document.getElementById('iImgRemove');
    if (item?.img) {
      preview.src = '../' + item.img;
      preview.style.display = 'block';
      placeholder.style.display = 'none';
      removeBtn.style.display = 'block';
    } else {
      preview.style.display = 'none';
      placeholder.style.display = 'flex';
      removeBtn.style.display = 'none';
    }
    // reset tabs
    document.querySelector('#itemModal .tab').click();
    openModal('itemModal');
  }

  async function saveItem() {
    const data = {
      name:      document.getElementById('iName').value,
      nameHe:    document.getElementById('iNameHe').value,
      desc:      document.getElementById('iDesc').value,
      descHe:    document.getElementById('iDescHe').value,
      price:     document.getElementById('iPrice').value,
      comment:   document.getElementById('iComment').value,
      available: document.getElementById('iAvailable').checked,
    };
    if (!data.name) return;
    if (editingItemId) {
      await updateDoc(doc(db, currentCat, editingItemId), data);
      toast('Saved ✓');
    } else {
      await addDoc(collection(db, currentCat), data);
      toast('Added ✓');
    }
    closeModal('itemModal');
    loadItems();
  }

  // ── CATEGORY MODAL ──
  let editingCatId = null;

  document.getElementById('addCatBtn').onclick   = () => { openCatModal(null); };
  document.getElementById('catModalCancel').onclick = () => closeModal('catModal');
  document.getElementById('catModalClose').onclick  = () => closeModal('catModal');
  document.getElementById('catModalSave').onclick   = async () => {
    if (!editingCatId) { closeModal('catModal'); return; }
    const data = {
      labelHe: document.getElementById('cNameHe').value.trim(),
      desc:    document.getElementById('cDesc').value.trim(),
      descHe:  document.getElementById('cDescHe').value.trim(),
      comment: document.getElementById('cComment').value.trim(),
      visible: document.getElementById('cVisible').checked,
    };
    await setDoc(doc(db, '_categories', editingCatId), data, { merge: true });
    closeModal('catModal');
    toast('Saved ✓');
    loadCategories();
  };

  function openCatModal(cat) {
    editingCatId = cat?.id || null;
    document.getElementById('catModalTitle').textContent = cat ? 'Edit Category' : 'Add Category';
    document.getElementById('cName').value    = cat?.label  || '';
    document.getElementById('cNameHe').value  = cat?.labelHe || '';
    document.getElementById('cDesc').value    = cat?.desc   || '';
    document.getElementById('cDescHe').value  = cat?.descHe || '';
    document.getElementById('cComment').value = cat?.comment || '';
    document.getElementById('cVisible').checked = cat?.visible !== false;
    document.querySelector('#catModal .tab').click();
    openModal('catModal');
  }

  // ── HELPERS ──
  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  document.querySelectorAll('.overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
