<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bulochka Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f4ef;
      --white: #ffffff;
      --brown: #2a1f18;
      --brown-mid: #7a5a3f;
      --brown-light: #9c8978;
      --brown-faint: rgba(42,31,24,0.08);
      --sage: #6b8e5a;
      --red: #c0392b;
      --sans: 'Inter Tight', system-ui, sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--brown); min-height: 100vh; }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--white);
      border: 1px solid var(--brown-faint);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
    }
    .login-box h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .login-box p { font-size: 13px; color: var(--brown-light); margin-bottom: 28px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--brown-light); }
    .field input {
      padding: 10px 14px;
      border: 1px solid var(--brown-faint);
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 14px;
      background: var(--bg);
      color: var(--brown);
      outline: none;
      transition: border 0.2s;
    }
    .field input:focus { border-color: var(--brown-mid); }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--brown);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: var(--brown-mid); }
    .login-error { font-size: 12px; color: var(--red); margin-top: 10px; text-align: center; }

    /* ── ADMIN LAYOUT ── */
    .admin-wrap { display: none; }
    .admin-wrap.visible { display: block; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      border-bottom: 1px solid var(--brown-faint);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-logo { font-size: 18px; font-weight: 600; }
    .topbar-logo span { color: var(--brown-mid); font-weight: 400; font-size: 13px; margin-left: 8px; }
    .btn-logout {
      font-size: 12px;
      color: var(--brown-light);
      background: none;
      border: 1px solid var(--brown-faint);
      border-radius: 100px;
      padding: 6px 16px;
      cursor: pointer;
      font-family: var(--sans);
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-logout:hover { color: var(--brown); border-color: var(--brown); }

    .admin-body { max-width: 900px; margin: 0 auto; padding: 32px 24px 80px; }

    /* ── CATEGORY TABS ── */
    .cat-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .cat-tab {
      font-size: 12px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 100px;
      border: 1px solid var(--brown-faint);
      background: var(--white);
      color: var(--brown-mid);
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.2s;
    }
    .cat-tab.active { background: var(--brown); color: white; border-color: var(--brown); }
    .cat-tab:hover:not(.active) { border-color: var(--brown-mid); color: var(--brown); }

    /* ── ITEMS LIST ── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .section-header h2 { font-size: 18px; font-weight: 600; }
    .btn-add {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 18px;
      background: var(--sage);
      color: white;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      font-family: var(--sans);
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.85; }

    .items-list { display: flex; flex-direction: column; gap: 10px; }
    .item-row {
      background: var(--white);
      border: 1px solid var(--brown-faint);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .item-row-body { flex: 1; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .item-field { display: flex; flex-direction: column; gap: 3px; }
    .item-field label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--brown-light); }
    .item-field input {
      font-family: var(--sans);
      font-size: 14px;
      border: none;
      background: transparent;
      color: var(--brown);
      outline: none;
      border-bottom: 1px solid transparent;
      padding: 2px 0;
      transition: border-color 0.2s;
      min-width: 80px;
    }
    .item-field input:focus { border-bottom-color: var(--brown-mid); }
    .item-field.name input { min-width: 160px; font-weight: 500; }
    .item-field.desc input { min-width: 200px; font-size: 13px; color: var(--brown-light); }
    .item-field.name-he input { min-width: 120px; }
    .item-field.price input { min-width: 80px; }

    .btn-save-item {
      font-size: 11px;
      font-weight: 500;
      padding: 6px 14px;
      background: var(--sage);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--sans);
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .btn-save-item:hover { opacity: 0.85; }
    .btn-save-item.saved { background: #888; }

    .btn-delete-item {
      font-size: 18px;
      color: var(--brown-light);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: color 0.2s;
    }
    .btn-delete-item:hover { color: var(--red); }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--brown-light);
      font-size: 14px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(42,31,24,0.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
      margin: 24px;
    }
    .modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
    .modal .field { margin-bottom: 14px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
    .btn-cancel {
      padding: 10px 20px;
      border: 1px solid var(--brown-faint);
      border-radius: 8px;
      background: none;
      font-family: var(--sans);
      font-size: 13px;
      cursor: pointer;
      color: var(--brown-mid);
    }
    .btn-create {
      padding: 10px 20px;
      background: var(--brown);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-create:hover { background: var(--brown-mid); }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--brown);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 300;
    }
    .toast.show { opacity: 1; transform: none; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>Bulochka</h1>
    <p>Admin panel — sign in to continue</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <button class="btn-login" id="loginBtn">Sign in</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-wrap" id="adminWrap">
  <div class="topbar">
    <div class="topbar-logo">Bulochka <span>Admin</span></div>
    <button class="btn-logout" id="logoutBtn">Sign out</button>
  </div>
  <div class="admin-body">
    <div class="cat-tabs" id="catTabs"></div>
    <div class="section-header">
      <h2 id="catTitle">Menu</h2>
      <button class="btn-add" id="addItemBtn">+ Add item</button>
    </div>
    <div class="items-list" id="itemsList"></div>
  </div>
</div>

<!-- ADD ITEM MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>New item</h3>
    <div class="field"><label>Name (English)</label><input type="text" id="newName" placeholder="Espresso"></div>
    <div class="field"><label>Name (Hebrew)</label><input type="text" id="newNameHe" placeholder="אספרסו" dir="rtl"></div>
    <div class="field"><label>Description (English)</label><input type="text" id="newDesc" placeholder="Short or long..."></div>
    <div class="field"><label>Description (Hebrew)</label><input type="text" id="newDescHe" placeholder="קצר או ארוך..." dir="rtl"></div>
    <div class="field"><label>Price</label><input type="text" id="newPrice" placeholder="₪10 / ₪13"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">Cancel</button>
      <button class="btn-create" id="modalCreate">Add item</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyC_zaNtYW8wnS7nhoOzEvkNhbJeJPHWmaI",
    authDomain: "bulweb2.firebaseapp.com",
    projectId: "bulweb2",
    storageBucket: "bulweb2.firebasestorage.app",
    messagingSenderId: "260150671022",
    appId: "1:260150671022:web:6dfa58bd50a9725cec9f3f"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const CATEGORIES = [
    { id: 'hot-drinks',   label: 'Hot Drinks' },
    { id: 'cold-drinks',  label: 'Cold Drinks' },
    { id: 'sandwiches',   label: 'Sandwiches & Salads' },
    { id: 'pastries',     label: 'Pastries' },
    { id: 'filled',       label: 'Filled Croissants' },
    { id: 'tartlets',     label: 'Tartlets' },
    { id: 'cakes',        label: 'Cakes & Desserts' },
    { id: 'ice-cream',    label: 'Ice Cream' },
    { id: 'alcohol',      label: 'Alcohol' },
    { id: 'friday',       label: 'Friday Special' },
  ];

  let currentCat = CATEGORIES[0].id;

  // AUTH
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPassword').value;
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
      document.getElementById('loginError').textContent = 'Wrong email or password';
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, user => {
    document.getElementById('loginWrap').style.display = user ? 'none' : 'flex';
    document.getElementById('adminWrap').className = user ? 'admin-wrap visible' : 'admin-wrap';
    if (user) initAdmin();
  });

  // ADMIN
  function initAdmin() {
    const tabs = document.getElementById('catTabs');
    tabs.innerHTML = '';
    CATEGORIES.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-tab' + (cat.id === currentCat ? ' active' : '');
      btn.textContent = cat.label;
      btn.addEventListener('click', () => {
        currentCat = cat.id;
        document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('catTitle').textContent = cat.label;
        loadItems();
      });
      tabs.appendChild(btn);
    });
    document.getElementById('catTitle').textContent = CATEGORIES[0].label;
    loadItems();
  }

  async function loadItems() {
    const list = document.getElementById('itemsList');
    list.innerHTML = '<div class="empty-state">Loading...</div>';
    const snap = await getDocs(collection(db, currentCat));
    const items = [];
    snap.forEach(d => items.push({ id: d.id, ...d.data() }));
    renderItems(items);
  }

  function renderItems(items) {
    const list = document.getElementById('itemsList');
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state">No items yet — add the first one</div>';
      return;
    }
    list.innerHTML = '';
    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML = `
        <div class="item-row-body">
          <div class="item-field name"><label>Name EN</label><input type="text" value="${esc(item.name || '')}" data-field="name"></div>
          <div class="item-field name-he"><label>Name HE</label><input type="text" value="${esc(item.nameHe || '')}" data-field="nameHe" dir="rtl"></div>
          <div class="item-field price"><label>Price</label><input type="text" value="${esc(item.price || '')}" data-field="price"></div>
          <div class="item-field desc"><label>Desc EN</label><input type="text" value="${esc(item.desc || '')}" data-field="desc"></div>
          <div class="item-field desc"><label>Desc HE</label><input type="text" value="${esc(item.descHe || '')}" data-field="descHe" dir="rtl"></div>
        </div>
        <button class="btn-save-item" data-id="${item.id}">Save</button>
        <button class="btn-delete-item" data-id="${item.id}">×</button>
      `;
      row.querySelector('.btn-save-item').addEventListener('click', async e => {
        const inputs = row.querySelectorAll('input');
        const data = {};
        inputs.forEach(inp => data[inp.dataset.field] = inp.value);
        await updateDoc(doc(db, currentCat, item.id), data);
        showToast('Saved ✓');
      });
      row.querySelector('.btn-delete-item').addEventListener('click', async () => {
        if (confirm('Delete this item?')) {
          await deleteDoc(doc(db, currentCat, item.id));
          loadItems();
        }
      });
      list.appendChild(row);
    });
  }

  function esc(str) { return str.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

  // ADD ITEM
  document.getElementById('addItemBtn').addEventListener('click', () => {
    document.getElementById('modalOverlay').classList.add('open');
  });
  document.getElementById('modalCancel').addEventListener('click', () => {
    document.getElementById('modalOverlay').classList.remove('open');
  });
  document.getElementById('modalCreate').addEventListener('click', async () => {
    const data = {
      name:    document.getElementById('newName').value,
      nameHe:  document.getElementById('newNameHe').value,
      desc:    document.getElementById('newDesc').value,
      descHe:  document.getElementById('newDescHe').value,
      price:   document.getElementById('newPrice').value,
    };
    if (!data.name) return;
    await addDoc(collection(db, currentCat), data);
    document.getElementById('modalOverlay').classList.remove('open');
    ['newName','newNameHe','newDesc','newDescHe','newPrice'].forEach(id => document.getElementById(id).value = '');
    loadItems();
    showToast('Item added ✓');
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
